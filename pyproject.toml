[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"


[project]
name = "bks-git-viewer"
version = "0.1.0"
description = "Interactive Git Commands Viewer"
requires-python = ">=3.10"

dependencies = [
	"fastapi",
	"uvicorn",
	"typer",
	"rich",
]

[project.scripts]
bks-git-viewer = "bks_git_viewer.cli:app"
